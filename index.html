<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portafolio de Proyectos — Innovación</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Preconnect: resuelve DNS/TLS antes de que el JS arranque -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- font-display=swap: el texto es legible con fuente del sistema mientras carga Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ── Skeleton loader (visible hasta que React hidrata) ── */
      #root:empty {
        min-height: 100vh;
        background: #F4F6F8;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        font-family: 'Aptos', 'Segoe UI', -apple-system, sans-serif;
      }
      #root:empty::before {
        content: '';
        width: 44px;
        height: 44px;
        border: 3px solid #EEF1F5;
        border-top-color: #267B8A;
        border-radius: 50%;
        animation: sk-spin 0.8s linear infinite;
      }
      #root:empty::after {
        content: 'Cargando portafolio…';
        font-size: 13px;
        font-weight: 600;
        color: #8899AB;
        letter-spacing: 0.02em;
      }
      @keyframes sk-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body style="margin:0; background:#F4F6F8;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
